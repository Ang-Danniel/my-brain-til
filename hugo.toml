baseURL = 'https://ang-danniel.github.io/my-brain-til/'
languageCode = 'en-us'
title = "Today i learned.."
copyright = 'Ang-Danniel' # Used in the footer copyright mention.
enableRobotsTXT = true # IMPORTANT: set to true if you want to use the theme's genAI/LLM web crawler blocking feature.
theme = "til"

[params]
    [params.author]
        name = "Danniel"
        email = "danniel.ang8@gmail.com"

[outputs]
  home = ['html']
  section = ['html', 'rss', 'json']
  page = ['html']

[menus]
  [[menus.main]]      
    name = 'Notes'
    pageRef = '/notes'
    weight = 20
  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 30
  [[menus.main]]
    name = 'Graph'
    pageRef = '/graph'
    weight = 40

[markup]
  [markup.highlight]
    noClasses = false
    style = 'tokyonight-night'

  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
